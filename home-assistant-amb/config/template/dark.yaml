- binary_sensor:
    - name: Sufficiently Dark For Indoor Lights
      unique_id: sufficiently_dark_for_indoor_lights
      icon: mdi:moon-waning-crescent
      state: >
        {{ states('sensor.motion_garden_illuminance_filtered') | int(0) <
           states('input_number.illuminance_threshold_indoor_lights') | int(3000)
        }}

    - name: Sufficiently Dark For Outdoor Lights
      unique_id: sufficiently_dark_for_outdoor_lights
      icon: mdi:moon-waning-crescent
      state: >
        {{ states('sensor.motion_garden_illuminance_filtered') | int(0) <
           states('input_number.illuminance_threshold_outdoor_lights') | int(300)
        }}
