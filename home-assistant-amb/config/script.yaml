wake_up_light_kids_set_green:
  alias: "Wake up light kids: Set to green"
  sequence:
    - service: adaptive_lighting.set_manual_control
      entity_id:
        - switch.adaptive_lighting_bedroom_olivier_color
        - switch.adaptive_lighting_bedroom_duco_color
    - service: light.turn_on
      target:
        entity_id:
          - light.light_group_bedroom_olivier_color
          - light.light_group_bedroom_duco_color
      data:
        color_name: "green"
        brightness_pct: 10
        transition: 1

fan_study_turn_on:
  alias: "Fan Study: Turn on at calculated speed"
  sequence:
    - variables:
        target_pct: >
          {% set t = states('sensor.climate_study_feels_like_temperature') | float(0) %}
          {% set s = states('input_number.fan_study_start_temp') | float(23) %}
          {% set e = states('input_number.fan_study_end_temp') | float(30) %}
          {% set p = states('input_number.fan_study_end_pct') | float(50) %}
          {% if t < s or e <= s %}0
          {% elif t >= e %}{{ p | int }}
          {% else %}{{ (1 + (p - 1) * (t - s) / (e - s)) | round(0) | int }}{% endif %}
    - if:
        - condition: template
          value_template: "{{ target_pct | int > 0 }}"
      then:
        - action: fan.set_percentage
          data:
            percentage: "{{ target_pct }}"
          target:
            entity_id: fan.fan_study

fan_bedroom_jc_turn_on:
  alias: "Fan Bedroom JC: Turn on at calculated speed"
  sequence:
    - variables:
        target_pct: >
          {% set t = states('sensor.climate_bedroom_jc_feels_like_temperature') | float(0) %}
          {% set s = states('input_number.fan_bedroom_jc_start_temp') | float(20) %}
          {% set e = states('input_number.fan_bedroom_jc_end_temp') | float(30) %}
          {% set p = states('input_number.fan_bedroom_jc_end_pct') | float(90) %}
          {% if t < s or e <= s %}0
          {% elif t >= e %}{{ p | int }}
          {% else %}{{ (1 + (p - 1) * (t - s) / (e - s)) | round(0) | int }}{% endif %}
    - if:
        - condition: template
          value_template: "{{ target_pct | int > 0 }}"
      then:
        - action: fan.set_percentage
          data:
            percentage: "{{ target_pct }}"
          target:
            entity_id: fan.fan_bedroom_jc

wake_up_light_kids_stop_cycle:
  alias: "Wake up light kids: Stop cycle"
  sequence:
    - service: automation.turn_off
      target:
        entity_id: automation.wake_up_light_kids
      data:
        stop_actions: true
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.wake_up_lights_kids_cycle_in_progress
    - service: automation.turn_on
      target:
        entity_id: automation.wake_up_light_kids
