wake_up_light_kids_set_green:
  alias: "Wake up light kids: Set to green"
  sequence:
    - service: adaptive_lighting.set_manual_control
      entity_id:
        - switch.adaptive_lighting_bedroom_olivier_color
        - switch.adaptive_lighting_bedroom_duco_color
    - service: light.turn_on
      target:
        entity_id:
          - light.light_group_bedroom_olivier_color
          - light.light_group_bedroom_duco_color
      data:
        color_name: "green"
        brightness_pct: 10
        transition: 1

fan_study_turn_on:
  alias: "Fan Study: Turn on at calculated speed"
  sequence:
    - variables:
        target_pct: >
          {% set t = states('sensor.climate_study_feels_like_temperature') | float(0) %}
          {% set s = states('input_number.fan_study_start_temp') | float(24) %}
          {% set e = states('input_number.fan_study_end_temp') | float(32) %}
          {% set p = states('input_number.fan_study_end_pct') | float(50) %}
          {% if t < s or e <= s %}0
          {% elif t >= e %}{{ p | int }}
          {% else %}{{ (1 + (p - 1) * (t - s) / (e - s)) | round(0) | int }}{% endif %}
    - if:
        - condition: template
          value_template: "{{ target_pct | int > 0 }}"
      then:
        - action: fan.set_percentage
          data:
            percentage: "{{ target_pct }}"
          target:
            entity_id: fan.fan_study

fan_bedroom_jc_turn_on:
  alias: "Fan Bedroom JC: Turn on at calculated speed"
  sequence:
    - variables:
        target_pct: >
          {% set t = states('sensor.climate_bedroom_jc_feels_like_temperature') | float(0) %}
          {% set s = states('input_number.fan_bedroom_jc_start_temp') | float(25) %}
          {% set e = states('input_number.fan_bedroom_jc_end_temp') | float(32) %}
          {% set p = states('input_number.fan_bedroom_jc_end_pct') | float(80) %}
          {% if t < s or e <= s %}0
          {% elif t >= e %}{{ p | int }}
          {% else %}{{ (1 + (p - 1) * (t - s) / (e - s)) | round(0) | int }}{% endif %}
    - if:
        - condition: template
          value_template: "{{ target_pct | int > 0 }}"
      then:
        - action: fan.set_percentage
          data:
            percentage: "{{ target_pct }}"
          target:
            entity_id: fan.fan_bedroom_jc

window_heat_send_close_alert:
  alias: "Window heat alert: send close notification"
  fields:
    floor_name:
      description: "Floor name shown in the notification"
    outdoor_temperature_sensor:
      description: "Entity id of the outdoor temperature sensor"
    forecast_max_sensor:
      description: "Entity id of the forecast max sensor"
    close_sent_helper:
      description: "input_boolean entity id to mark as sent"
  sequence:
    - condition: template
      value_template: >-
        {% set mx = states(forecast_max_sensor) | float(none) %}
        {% set out = states(outdoor_temperature_sensor) | float(none) %}
        {{ mx is none or out is none or (mx - out) >= 0.5 }}
    - service: notify.mobile_app_j16
      data:
        title: "☀️ Close windows - {{ floor_name }}"
        message: >-
          It is now warmer outside ({{ states(outdoor_temperature_sensor) | float | round(1) }}°C) than on the {{ floor_name | lower }}.
          {% set mx = state_attr(forecast_max_sensor, 'day_max') | float(none) %}
          {% if mx is not none %}Today's high is {{ mx | round(1) }}°C.{% endif %}
        data:
          url: /dashboard-climate/inside-vs-outside
          actions:
            - action: "URI"
              title: "Open Climate"
              uri: "/dashboard-climate/inside-vs-outside"
    - service: input_boolean.turn_on
      target:
        entity_id: "{{ close_sent_helper }}"

wake_up_light_kids_stop_cycle:
  alias: "Wake up light kids: Stop cycle"
  sequence:
    - service: automation.turn_off
      target:
        entity_id: automation.wake_up_light_kids
      data:
        stop_actions: true
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.wake_up_lights_kids_cycle_in_progress
    - service: automation.turn_on
      target:
        entity_id: automation.wake_up_light_kids
