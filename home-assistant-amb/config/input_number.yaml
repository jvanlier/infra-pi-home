illuminance_threshold_indoor_lights:
  # "Dark Outside" lights turn on when illuminance is below this threshold.
  name: Illuminance Threshold Indoor Lights
  initial: 3000
  min: 1000
  max: 6000
  step: 100
  unit_of_measurement: "lx"

illuminance_threshold_outdoor_lights:
  name: Illuminance Threshold Outdoor Lights
  initial: 300
  min: 100
  max: 1000
  step: 50
  unit_of_measurement: "lx"

fridge_temperature_threshold:
  name: Fridge Temperature Threshold
  initial: 8
  min: 5
  max: 15
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:fridge-alert"

wake_up_light_kids_minutes_until_green:
  name: Wake Up Light Kids Minutes Until Green
  initial: 10
  min: 1
  max: 30
  step: 1
  unit_of_measurement: "minutes"
  icon: "mdi:clock-plus-outline"

fan_study_start_temp:
  name: Fan Study Start Feels Like Temp
  initial: 24
  min: 15
  max: 30
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:fan-chevron-down"

fan_study_end_temp:
  name: Fan Study End Feels Like Temp
  initial: 32
  min: 18
  max: 35
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:fan-chevron-up"

fan_study_end_pct:
  name: Fan Study End Speed
  initial: 50
  min: 1
  max: 100
  step: 1
  unit_of_measurement: "%"
  icon: "mdi:fan"

fan_bedroom_jc_start_temp:
  name: Fan Bedroom JC Start Feels Like Temp
  initial: 25
  min: 15
  max: 30
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:fan-chevron-down"

fan_bedroom_jc_end_temp:
  name: Fan Bedroom JC End Feels Like Temp
  initial: 32
  min: 18
  max: 35
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:fan-chevron-up"

fan_bedroom_jc_end_pct:
  name: Fan Bedroom JC End Speed
  initial: 80
  min: 1
  max: 100
  step: 1
  unit_of_measurement: "%"
  icon: "mdi:fan"

window_alert_hot_day_threshold:
  name: Window Alert Hot Day Threshold
  initial: 25
  min: 20
  max: 35
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:thermometer-high"

window_alert_hysteresis:
  name: Window Alert Hysteresis
  initial: 0.5
  min: 0
  max: 3
  step: 0.1
  unit_of_measurement: "°C"
  icon: "mdi:arrow-expand-vertical"
