views:
  - title: Thermostats
    path: thermostats
    icon: mdi:thermostat
    type: sections
    badges:
      - type: entity
        entity: binary_sensor.ib1863854592_connection_state
        name: Internet Bridge
        show_name: true
      - type: entity
        entity: binary_sensor.tado_thermostat_living_battery
        name: Living
        show_name: true
      - type: entity
        entity: binary_sensor.tado_thermostat_bedroom_jc_battery
        name: Bedroom JC
        show_name: true
      - type: entity
        entity: binary_sensor.tado_thermostat_valve_study_battery
        name: Study
        show_name: true
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Thermostats
            heading_style: title
            icon: mdi:thermostat
          - type: tile
            entity: climate.living
            features:
              - type: target-temperature
          - type: tile
            entity: climate.study
            features:
              - type: target-temperature
          - type: tile
            entity: climate.bedroom_jc
            features:
              - type: target-temperature
          - type: heading
            heading: Heating percentage 24h
            heading_style: subtitle
            icon: mdi:heat-wave
          - type: history-graph
            entities:
              - entity: sensor.living_heating
              - entity: sensor.study_heating
              - entity: sensor.bedroom_jc_heating
            hours_to_show: 24

  - title: Fans
    path: fans
    icon: mdi:fan
    type: sections
    max_columns: 2
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_study_temperature
        name: Study
        icon: mdi:chair-rolling
        color: teal
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bedroom_jc_temperature
        name: Bedroom JC
        icon: mdi:bed
        color: red
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Fans
            heading_style: title
            icon: mdi:fan
          - type: heading
            heading: Study
            heading_style: subtitle
            icon: mdi:chair-rolling
          - type: tile
            entity: fan.fan_study
            features:
              - type: fan-speed
          - type: tile
            entity: switch.fan_study_night_mode
            name: Night Mode
            icon: mdi:weather-night
            tap_action:
              action: toggle
          - type: tile
            entity: switch.fan_study_child_lock
            name: Child Lock
            icon: mdi:lock
            tap_action:
              action: toggle
          - type: heading
            heading: Bedroom JC
            heading_style: subtitle
            icon: mdi:bed
          - type: tile
            entity: fan.fan_bedroom_jc
            features:
              - type: fan-speed
          - type: tile
            entity: switch.fan_bedroom_jc_night_mode
            name: Night Mode
            icon: mdi:weather-night
            tap_action:
              action: toggle
          - type: tile
            entity: switch.fan_bedroom_jc_child_lock
            name: Child Lock
            icon: mdi:lock
            tap_action:
              action: toggle
      - type: grid
        cards:
          - type: heading
            heading: Settings
            heading_style: title
            icon: mdi:cog
          - type: heading
            heading: Study
            heading_style: subtitle
            icon: mdi:chair-rolling
          - type: horizontal-stack
            grid_options:
              columns: full
            cards:
              - type: tile
                entity: input_number.fan_study_start_temp
                name: Start Temp
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: input_number.fan_study_end_temp
                name: End Temp
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: input_number.fan_study_end_pct
                name: End Speed
                features:
                  - type: numeric-input
                    style: buttons
          - type: heading
            heading: Bedroom JC
            heading_style: subtitle
            icon: mdi:bed
          - type: horizontal-stack
            grid_options:
              columns: full
            cards:
              - type: tile
                entity: input_number.fan_bedroom_jc_start_temp
                name: Start Temp
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: input_number.fan_bedroom_jc_end_temp
                name: End Temp
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: input_number.fan_bedroom_jc_end_pct
                name: End Speed
                features:
                  - type: numeric-input
                    style: buttons
          - type: custom:plotly-graph
            grid_options:
              columns: full
            refresh_interval: 2
            title: Desired fan speed vs temperature
            layout:
              height: 260
              margin:
                t: 16
                r: 16
                b: 64
                l: 56
              xaxis:
                title: "Temperature (°C)"
                type: linear
                range: [18, 32]
                dtick: 2
              yaxis:
                title: "Speed (%)"
                range: [0, 100]
                dtick: 20
            entities:
              - entity: ""
                name: Study
                line:
                  color: "#009688"
                x: $ex (() => { const s=Number(hass.states['input_number.fan_study_start_temp'].state), e=Number(hass.states['input_number.fan_study_end_temp'].state); const xs=[]; for(let t=18;t<=32.0001;t+=0.5)xs.push(t); return xs; })()
                y: $ex (() => { const s=Number(hass.states['input_number.fan_study_start_temp'].state), e=Number(hass.states['input_number.fan_study_end_temp'].state), p=Number(hass.states['input_number.fan_study_end_pct'].state); const ys=[]; for(let t=18;t<=32.0001;t+=0.5){let y; if(t<s||e<=s)y=0; else if(t>=e)y=p; else y=1+(p-1)*(t-s)/(e-s); ys.push(Math.round(y*10)/10);} return ys; })()
              - entity: ""
                name: Bedroom JC
                line:
                  color: "#f44336"
                x: $ex (() => { const s=Number(hass.states['input_number.fan_bedroom_jc_start_temp'].state), e=Number(hass.states['input_number.fan_bedroom_jc_end_temp'].state); const xs=[]; for(let t=18;t<=32.0001;t+=0.5)xs.push(t); return xs; })()
                y: $ex (() => { const s=Number(hass.states['input_number.fan_bedroom_jc_start_temp'].state), e=Number(hass.states['input_number.fan_bedroom_jc_end_temp'].state), p=Number(hass.states['input_number.fan_bedroom_jc_end_pct'].state); const ys=[]; for(let t=18;t<=32.0001;t+=0.5){let y; if(t<s||e<=s)y=0; else if(t>=e)y=p; else y=1+(p-1)*(t-s)/(e-s); ys.push(Math.round(y*10)/10);} return ys; })()
          - type: markdown
            content: |
              | | Study | Bedroom JC |
              |---|---|---|
              | **On** | Workstation in use (plug > 60 W) | 21:00, if someone home |
              | **Off** | Workstation idle | 09:00 |
              | **Night mode** | — | 22:00 |

              _Hardcoded in the automation — cannot be changed here._
            grid_options:
              columns: full

  - title: Measurements
    path: measurements
    icon: mdi:chart-areaspline
    type: sections
    max_columns: 4
    badges:
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_living_temperature
        icon: mdi:sofa
        name: Living
        color: indigo
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bathroom_temperature
        name: Bathroom
        icon: mdi:shower-head
        color: amber
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bedroom_jc_temperature
        icon: mdi:bed
        name: Bedroom JC
        color: red
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_study_temperature
        name: Study
        icon: mdi:chair-rolling
        color: teal
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bedroom_olivier_temperature
        icon: mdi:bed
        name: Bedroom Olivier
        color: purple
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_laundry_temperature
        icon: mdi:tshirt-crew
        name: Laundry
        color: pink
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bedroom_duco_temperature
        icon: mdi:bed
        name: Bedroom Duco
        color: brown
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_attic_temperature
        icon: mdi:home-roof
        name: Attic
        color: blue
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_central_heating_temperature
        icon: mdi:radiator
        name: Central Heating
        color: green
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Temperature
            heading_style: title
            icon: mdi:thermometer
          - &heading_1_day
            type: heading
            heading_style: subtitle
            icon: ''
            heading: 1 day
          - type: history-graph
            hours_to_show: 24
            entities: &entities_temperature
              - entity: sensor.climate_living_temperature
                name: Living
              - entity: sensor.climate_bathroom_temperature
                name: Bathroom
              - entity: sensor.climate_bedroom_jc_temperature
                name: Bedroom JC
              - entity: sensor.climate_study_temperature
                name: Study
              - entity: sensor.climate_bedroom_olivier_temperature
                name: Bedroom Olivier
              - entity: sensor.climate_laundry_temperature
                name: Laundry
              - entity: sensor.climate_bedroom_duco_temperature
                name: Bedroom Duco
              - entity: sensor.climate_attic_temperature
                name: Attic
              - entity: sensor.climate_central_heating_temperature
                name: Central Heating
            grid_options: &grid_options_temperature
              columns: full
              rows: 6
          - &heading_1_week
            type: heading
            heading_style: subtitle
            icon: ''
            heading: 1 week
          - type: history-graph
            hours_to_show: 168
            entities: *entities_temperature
            grid_options: *grid_options_temperature
      - type: grid
        cards:
          - type: heading
            heading: Humidity
            heading_style: title
            icon: mdi:water-percent
          - *heading_1_day
          - type: history-graph
            hours_to_show: 24
            entities: &entities_humidity
              - entity: sensor.climate_living_humidity
                name: Living
              - entity: sensor.climate_bathroom_humidity
                name: Bathroom
              - entity: sensor.climate_bedroom_jc_humidity
                name: Bedroom JC
              - entity: sensor.climate_study_humidity
                name: Study
              - entity: sensor.climate_bedroom_olivier_humidity
                name: Bedroom Olivier
              - entity: sensor.climate_laundry_humidity
                name: Laundry
              - entity: sensor.climate_bedroom_duco_humidity
                name: Bedroom Duco
              - entity: sensor.climate_attic_humidity
                name: Attic
              - entity: sensor.climate_central_heating_humidity
                name: Central Heating
            min_y_axis: &min_y_axis_humidity 30
            max_y_axis: &max_y_axis_humidity 80
            fit_y_data: true
            grid_options: &grid_options_humidity
              columns: 12
              rows: 6
          - *heading_1_week
          - type: history-graph
            hours_to_show: 168
            entities: *entities_humidity
            min_y_axis: *min_y_axis_humidity
            max_y_axis: *max_y_axis_humidity
            fit_y_data: true
            grid_options: *grid_options_humidity
