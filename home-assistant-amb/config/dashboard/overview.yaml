views:
  - title: Overview
    path: main
    icon: mdi:view-dashboard
    type: sections
    max_columns: 3
    badges:
      - type: entity
        entity: person.jori
        show_name: true
        show_state: true
        show_icon: true
        show_entity_picture: true
      - type: entity
        entity: person.chantal
        show_name: true
        show_state: true
        show_icon: true
        show_entity_picture: true
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: binary_sensor.presence_house
        name: House
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: binary_sensor.presence_ground_floor
        name: Ground Floor
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: binary_sensor.presence_first_floor
        name: First Floor
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: binary_sensor.presence_second_floor
        name: Second Floor
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.electricity_meter_power_consumption
      - type: entity
        show_name: false
        show_state: true
        show_icon: true
        entity: sensor.electricity_meter_power_production
        color: purple
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.electricity_meter_current_phase_l1
        name: L1
        color: indigo
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.electricity_meter_current_phase_l2
        name: L2
        color: accent
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_living_temperature
        icon: mdi:sofa
        name: Living
        color: indigo
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bathroom_temperature
        name: Bathroom
        icon: mdi:shower-head
        color: amber
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_bedroom_jc_temperature
        icon: mdi:bed
        name: Bedroom JC
        color: red
      - type: entity
        show_name: true
        show_state: true
        show_icon: true
        entity: sensor.climate_study_temperature
        name: Study
        icon: mdi:chair-rolling
        color: teal
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: House scenes
            heading_style: title
            icon: mdi:palette
          - type: tile
            entity: input_boolean.sleep_mode
            tap_action:
              action: toggle
          - type: tile
            entity: input_boolean.sleep_mode_kids
            tap_action:
              action: toggle

          - type: heading
            heading: Lights
            heading_style: title
            icon: mdi:globe-light
          - type: heading
            heading: Wake up lights
            heading_style: subtitle
            icon: mdi:alarm-check
            tap_action:
              action: navigate
              navigation_path: /dashboard-lights/wake-up-lights
          - type: horizontal-stack
            cards:
              - type: tile
                name: Enabled
                entity: input_boolean.wake_up_light_kids_enabled
              - type: tile
                name: Start
                entity: input_datetime.wake_up_light_kids_start_orange
                color: deep-orange
              - type: tile
                name: Min. to green
                entity: input_number.wake_up_light_kids_minutes_until_green
                color: green
          - type: heading
            heading: Toggles
            heading_style: subtitle
            icon: mdi:light-switch
            tap_action:
              action: navigate
              navigation_path: /dashboard-lights/toggles
          - type: tile
            name: Living Spot Always
            entity: light.light_group_living_spot_always
          - type: tile
            name: Living Spot Dark
            entity: light.light_group_living_spot_dark_outside
          - type: tile
            name: Bathroom
            entity: light.light_bathroom
          - type: tile
            name: Study
            entity: light.light_group_study

          - type: heading
            heading: Illuminance
            heading_style: subtitle
            icon: mdi:weather-sunny
            tap_action:
              action: navigate
              navigation_path: /dashboard-lights/illuminance
          - type: history-graph
            entities:
              - entity: sensor.motion_garden_illuminance_filtered
                name: Illuminance
              - entity: input_number.illuminance_threshold_indoor_lights
                name: Thr. indoor
              - entity: input_number.illuminance_threshold_outdoor_lights
                name: Thr. outdoor
            hours_to_show: 24
            grid_options:
              columns: 12
              rows: 4

          - type: heading
            heading: Light automation
            heading_style: subtitle
            icon: mdi:robot
            tap_action:
              action: navigate
              navigation_path: /dashboard-lights/light-automation

      - type: grid
        cards:
          - type: heading
            heading: Climate
            heading_style: title
            icon: mdi:thermometer
          - type: heading
            heading: Thermostats
            heading_style: subtitle
            icon: mdi:thermostat-box
            tap_action:
              action: navigate
              navigation_path: /dashboard-climate/thermostats
          - type: tile
            entity: climate.living
            features:
              - type: target-temperature
          - type: tile
            entity: climate.study
            features:
              - type: target-temperature
          - type: heading
            heading: Fans
            heading_style: subtitle
            icon: mdi:fan
            tap_action:
              action: navigate
              navigation_path: /dashboard-climate/fans
          - type: tile
            entity: fan.fan_study
            features:
              - type: fan-speed
          - type: tile
            entity: fan.fan_bedroom_jc
            features:
              - type: fan-speed
          - type: heading
            heading_style: subtitle
            heading: Measurements
            icon: mdi:chart-areaspline
            tap_action:
              action: navigate
              navigation_path: /dashboard-climate/measurements
          - type: history-graph
            hours_to_show: 24
            entities:
              - entity: sensor.climate_living_temperature
                name: Living
              - entity: sensor.climate_bathroom_temperature
                name: Bathroom
              - entity: sensor.climate_bedroom_jc_temperature
                name: Bedroom JC
              - entity: sensor.climate_study_temperature
                name: Study
            grid_options:
              columns: 12
              rows: 4
          - type: history-graph
            hours_to_show: 24
            entities:
              - entity: sensor.climate_living_humidity
                name: Living
              - entity: sensor.climate_bathroom_humidity
                name: Bathroom
              - entity: sensor.climate_bedroom_jc_humidity
                name: Bedroom JC
              - entity: sensor.climate_study_humidity
                name: Study
            min_y_axis: 30
            max_y_axis: 80
            fit_y_data: true
            grid_options:
              columns: 12
              rows: 4
      - type: grid
        cards:
          - type: heading
            heading: Power
            heading_style: title
            icon: mdi:alpha-w
          - type: heading
            icon: mdi:transmission-tower
            heading: Grid
            heading_style: subtitle
            tap_action:
              action: navigate
              navigation_path: /dashboard-power/grid
          - type: history-graph
            entities:
              - entity: sensor.electricity_meter_power_net
            hours_to_show: 2
            grid_options:
              columns: 12
              rows: 4
          - type: heading
            icon: mdi:power-plug
            heading_style: subtitle
            heading: Plugs
            tap_action:
              action: navigate
              navigation_path: /dashboard-power/plugs
          - type: tile
            entity: switch.plug_entertainment
            features_position: bottom
            vertical: false
            icon: mdi:television
            color: pink
            name: Entertainment
          - type: tile
            entity: switch.plug_garden_lights
            features_position: bottom
            vertical: false
            color: amber
            icon: mdi:light-flood-up
            name: Garden Lights
          - type: heading
            heading: Appliances
            heading_style: subtitle
            icon: mdi:washing-machine
            tap_action:
              action: navigate
              navigation_path: /dashboard-power/appliances
          - type: tile
            entity: sensor.washing_machine_state
            icon: mdi:washing-machine
          - type: history-graph
            entities:
              - entity: sensor.washing_machine_state
                name: WM
            hours_to_show: 12
