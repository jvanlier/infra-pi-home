- alias: Fan Bedroom JC on
  id: fan-bedroom-jc-on
  trigger:
    - platform: time
      at: &turn_on_time "21:00:00"
  variables:
    target_pct: >
      {% set t = states('sensor.climate_bedroom_jc_temperature') | float(0) %}
      {% set s = states('input_number.fan_bedroom_jc_start_temp') | float(20) %}
      {% set e = states('input_number.fan_bedroom_jc_end_temp') | float(30) %}
      {% set p = states('input_number.fan_bedroom_jc_end_pct') | float(90) %}
      {% if t < s or e <= s %}0
      {% elif t >= e %}{{ p | int }}
      {% else %}{{ (1 + (p - 1) * (t - s) / (e - s)) | round(0) | int }}{% endif %}
  condition:
    - condition: state
      entity_id: binary_sensor.presence_house
      state: "on"
    - condition: state
      entity_id: fan.fan_bedroom_jc
      state: "off"
    - condition: template
      value_template: "{{ target_pct | int > 0 }}"
  action:
    - action: fan.set_percentage
      data:
        percentage: "{{ target_pct }}"
      target:
        entity_id: fan.fan_bedroom_jc
    # Night mode not turned off here: disabling it causes a beep, which is undesirable
    # if someone is sleeping in.
  mode: restart

- alias: Fan Bedroom JC night mode on
  id: fan-bedroom-jc-night-mode-on
  trigger:
    - platform: time
      at: "22:00:00"
  condition:
    - condition: state
      entity_id: fan.fan_bedroom_jc
      state: "on"
  action:
    - action: switch.turn_on
      target:
        entity_id: switch.fan_bedroom_jc_night_mode
  mode: restart

- alias: Fan Bedroom JC off
  id: fan-bedroom-jc-off
  trigger:
    - platform: time
      at: "08:00:00"
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - platform: time
      at: "09:00:00"
      weekday:
        - sat
        - sun
  condition:
    - condition: state
      entity_id: fan.fan_bedroom_jc
      state: "on"
  action:
    - action: fan.turn_off
      target:
        entity_id: fan.fan_bedroom_jc
  mode: restart
