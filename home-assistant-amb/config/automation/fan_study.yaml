- alias: Fan study on
  id: fan-study-on
  trigger:
    - platform: state
      entity_id: binary_sensor.workstation_in_use_immediate
      to: "on"
  variables:
    target_pct: >
      {% set t = states('sensor.climate_study_feels_like_temperature') | float(0) %}
      {% set s = states('input_number.fan_study_start_temp') | float(24) %}
      {% set e = states('input_number.fan_study_end_temp') | float(32) %}
      {% set p = states('input_number.fan_study_end_pct') | float(50) %}
      {% if t < s or e <= s %}0
      {% elif t >= e %}{{ p | int }}
      {% else %}{{ (1 + (p - 1) * (t - s) / (e - s)) | round(0) | int }}{% endif %}
  action:
    - action: fan.set_percentage
      data:
        percentage: "{{ target_pct }}"
      target:
        entity_id: fan.fan_study
  mode: restart

- alias: Fan study off
  id: fan-study-off
  trigger:
    - platform: state
      entity_id: binary_sensor.workstation_in_use
      to: "off"
  action:
    - action: fan.turn_off
      target:
        entity_id: fan.fan_study
  mode: restart
