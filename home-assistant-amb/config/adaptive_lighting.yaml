# N.b.: when adding/removing configs, also update:
# - automation/light_adaptive_toggle.yaml
# - automation/sleep_mode.yaml

# Interval tuning: each instance uses a distinct prime number (181-269s) so that no two
# instances ever update at the exact same moment. Two primes A and B can only collide
# every A*B seconds (e.g. 181*191 = ~9.6 hours), effectively eliminating simultaneous
# Zigbee group commands that would overload the coordinator.
# Lights that toggle frequently via motion/door sensors use only_once instead, since they
# get a fresh adaptation each time they turn on anyway.

- name: "hall-0-spot"
  lights: ["light.light_group_hall_0_spot"]
  min_brightness: 20
  max_brightness: 25
  min_color_temp: 2500
  max_color_temp: 4000
  sleep_transition: 5
  interval: 181

- name: "hall-0-wall"
  lights: ["light.light_hall_0_wall"]
  min_brightness: 15
  max_brightness: 20
  sleep_transition: 5
  interval: 191

- name: "toilet"
  lights: ["light.light_toilet"]
  min_brightness: 50
  max_brightness: 60
  min_color_temp: 2500
  max_color_temp: 4000
  sleep_transition: 5
  only_once: true

- name: "living-spot-always"
  lights: ["light.light_group_living_spot_always"]
  min_brightness: 50
  max_brightness: 50
  min_color_temp: 2500
  max_color_temp: 4000
  sleep_transition: 5
  interval: 193

- name: "living-spot-dark-outside"
  lights: ["light.light_group_living_spot_dark_outside"]
  min_brightness: 50
  max_brightness: 50
  min_color_temp: 2500
  max_color_temp: 4000
  sleep_transition: 5
  interval: 197

- name: "living-white-cabinet"
  lights: ["light.light_living_white_cabinet"]
  min_brightness: 5
  max_brightness: 15
  # Is more yellow than the spots, so make it go to warmer color temp:
  min_color_temp: 2000
  max_color_temp: 4000
  sleep_transition: 5
  interval: 199

- name: "stair-cabinet"
  lights: ["light.light_stair_cabinet"]
  min_brightness: 30
  max_brightness: 70
  sleep_brightness: 20
  min_color_temp: 3000
  max_color_temp: 4000
  # It's nice to see it come on gradually, otherwise the effect finishes before the door is open:
  initial_transition: 2
  sleep_transition: 5
  only_once: true

- name: "central-heating"
  lights: ["light.light_group_central_heating"]
  min_brightness: 30
  max_brightness: 70
  sleep_brightness: 20
  min_color_temp: 3000
  max_color_temp: 4000
  initial_transition: 2
  sleep_transition: 5
  only_once: true

- name: "dining-table"
  lights: ["light.light_dining_table"]
  min_brightness: 100
  max_brightness: 100
  sleep_brightness: 10
  min_color_temp: 2500
  max_color_temp: 4000
  sleep_transition: 5
  interval: 211

- name: "kitchen-middle"
  lights: ["light.light_group_kitchen_middle"]
  min_brightness: 40
  max_brightness: 40
  min_color_temp: 2700
  max_color_temp: 4000
  sleep_brightness: 8
  sleep_transition: 5
  interval: 223

- name: "kitchen-countertop"
  lights: ["light.light_group_kitchen_countertop"]
