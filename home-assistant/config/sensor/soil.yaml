# Uses https://github.com/Limych/ha-average
# The built-in filter with simple moving average appears to ignore updates when the device reports
# only once in the window.

- platform: average
  name: Soil Calathea humidity average
  unique_id: soil_calathea_humidity_average
  entities:
    - sensor.soil_calathea_humidity
  duration:
    hours: 3

